# Mirror-first Scryfall image cache.
#
# Requests look like  /large/front/e/0/<uuid>.jpg?<timestamp>  (the mod just
# swaps cards.scryfall.io -> this host, keeping the path + query). We serve the
# matching file from the local mirror and ignore the ?timestamp. If we don't
# have it yet (e.g. a brand-new printing between weekly pulls), we fall back to
# the weserv proxy -- which fetches from Scryfall with a real User-Agent and
# re-encodes to baseline -- and cache the result on disk.

proxy_cache_path /var/cache/nginx/scryfall levels=1:2 keys_zone=scry:50m
                 max_size=10g inactive=90d use_temp_path=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # needed to resolve images.weserv.nl for the fallback
    resolver 1.1.1.1 1.0.0.1 valid=300s;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # serve the mirrored file by path; on miss, hand off to the weserv fallback
    location / {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri @weserv;
    }

    # fallback: build images.weserv.nl/?url=cards.scryfall.io/<path>?<timestamp>
    # (the "?" is percent-encoded to %3F so it nests inside weserv's url param --
    # some Scryfall large/normal jpgs 404 without their timestamp)
    location @weserv {
        set $src "cards.scryfall.io$uri";
        if ($args) {
            set $src "cards.scryfall.io$uri%3F$args";
        }
        proxy_pass "https://images.weserv.nl/?url=$src";
        proxy_ssl_server_name on;
        proxy_set_header Host "images.weserv.nl";
        proxy_set_header User-Agent "mtg-edh-4player-tts-cache/0.1 (+github.com/klrmngr/mtg-edh-4player)";
        proxy_cache scry;
        proxy_cache_valid 200 90d;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=31536000" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
